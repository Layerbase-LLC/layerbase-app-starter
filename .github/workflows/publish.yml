name: Build and publish images

# Builds each example's container and pushes it to GHCR on every push to
# main. The v1 tag is what a Layerbase app catalog entry would pin (its
# defaultVersion); the exact semver tag is the immutable per-release identity
# the platform uses to detect available updates via the OCI version label.

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        example: [node-vite, nextjs]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: ident
        run: echo "version=$(node -p "require('./${{ matrix.example }}/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-${{ matrix.example }}
          tags: |
            type=raw,value=v1
            type=raw,value=latest
            type=raw,value=${{ steps.ident.outputs.version }}
            type=sha,format=long
          labels: |
            org.opencontainers.image.version=${{ steps.ident.outputs.version }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.example }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.example }}
          cache-to: type=gha,mode=max,scope=${{ matrix.example }}
