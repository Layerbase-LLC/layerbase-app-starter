name: Build and publish image

# Inert while this folder lives inside the layerbase-app-starter monorepo
# (GitHub only runs workflows at a repo root). The moment you copy this folder
# out as your own repository, it activates: every push to main builds the
# container and publishes it to YOUR GHCR namespace (github.repository).
# The v1 tag is what a Layerbase app catalog entry pins; the exact semver is
# the immutable per-release identity read from the OCI version label.

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: ident
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=v1
            type=raw,value=latest
            type=raw,value=${{ steps.ident.outputs.version }}
            type=sha,format=long
          labels: |
            org.opencontainers.image.version=${{ steps.ident.outputs.version }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
